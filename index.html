<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Propellic — Coiled Spring Forecaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Montserrat', sans-serif;
        background-color: #152534;
        color: white;
      }

      /* Subtle gradient mesh */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(226,26,107,0.18) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 80% 90%, rgba(72,35,66,0.35) 0%, transparent 55%);
        pointer-events: none;
      }

      main {
        position: relative;
        text-align: center;
        padding: 2.5rem 2rem;
        max-width: 680px;
      }

      .logo {
        width: clamp(180px, 40vw, 300px);
        margin-bottom: 2.5rem;
        filter: brightness(0) invert(1); /* white version on dark bg */
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: #E21A6B;
        margin-bottom: 1rem;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.8rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -.02em;
        margin-bottom: 1.25rem;
      }

      h1 span { color: #E21A6B; }

      .subtitle {
        font-size: clamp(.95rem, 2vw, 1.15rem);
        font-weight: 400;
        color: rgba(255,255,255,0.65);
        line-height: 1.65;
        margin-bottom: 2.5rem;
      }

      .badge {
        display: inline-block;
        background: rgba(226,26,107,0.15);
        border: 1px solid rgba(226,26,107,0.4);
        color: #EB669C;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: .08em;
        text-transform: uppercase;
        padding: 6px 16px;
        border-radius: 100px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="coiled_spring/assets/propellic-logo.png" alt="Propellic" class="logo" />
      <p class="eyebrow">Hackathon · Team 5</p>
      <h1>Coiled Spring<br /><span>Opportunity Forecaster</span></h1>
      <p class="subtitle">
        Identify moments where search intent stays high but conversion rates dip —
        and give clients a data-backed reason to hold spend.
      </p>
      <span class="badge">🌀 Built with Python · Streamlit · Google Ads API</span>
    </main>
  </body>
</html>
